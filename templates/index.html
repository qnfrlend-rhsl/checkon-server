<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckOn Rider</title>

    <!-- favicon -->
    <link rel="icon" href="{{ url_for('static', filename='icon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon.png') }}">

    <!-- PWA 느낌 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="CheckOn">

    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 30px;
        }

        button {
            display: block;
            width: 220px;
            margin: 12px auto;
            padding: 15px;
            font-size: 18px;
        }

        #pointBox {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>기사 선택</h2>

<button onclick="setUser('rider1')">기사 1</button>
<button onclick="setUser('rider2')">기사 2</button>
<button onclick="setUser('rider3')">기사 3</button>

<!-- 🔥 포인트만 표시 -->
<p id="pointBox">포인트: 0원</p>

<script>

// 저장된 기사 자동 복구
let user_id = localStorage.getItem("user_id");

// GPS 시작 여부
let trackingStarted = false;

// 마지막 전송 기록
let lastSendTime = 0;
let lastLat = null;
let lastLon = null;


// 기사 등록
function setUser(id) {

    if (user_id) {
        alert("이미 등록된 기사: " + user_id);
        return;
    }

    user_id = id;
    localStorage.setItem("user_id", id);

    if (!trackingStarted) {
        trackingStarted = true;
        startTracking();
        updatePoints();
    }
}


// GPS 시작
function startTracking() {
    navigator.geolocation.watchPosition(

        function(position) {

            if (!user_id) return;

            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const now = Date.now();

            // 최초 전송 이후 조건 검사
            if (lastLat !== null) {
                const distance = getDistance(lastLat, lastLon, lat, lon);

                if ((now - lastSendTime < 3000) && (distance < 5)) {
                    return;
                }
            }

            lastSendTime = now;
            lastLat = lat;
            lastLon = lon;

            fetch("https://retainer-prenatal-heave.ngrok-free.dev/location", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    user_id: user_id,
                    latitude: lat,
                    longitude: lon
                })
            })
            .then(res => res.json())
            .then(data => console.log("전송 성공:", data))
            .catch(err => console.log("전송 실패:", err));
        },

        function(error) {
            console.log("위치 오류:", error.message);
        },

        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }
    );
}


// 🔥 포인트 실시간 조회
function updatePoints() {
    if (!user_id) return;

    fetch("/points")
        .then(res => res.json())
        .then(data => {
            document.getElementById("pointBox").innerText =
                "포인트: " + (data[user_id] || 0) + "원";
        });
}

// 5초마다 포인트 갱신
setInterval(updatePoints, 5000);


// 앱 재접속 자동 복구
window.onload = function () {
    if (user_id) {
        if (!trackingStarted) {
            trackingStarted = true;
            startTracking();
            updatePoints();
        }
    }
};


// 거리 계산 함수
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const rad = Math.PI / 180;

    const dLat = (lat2 - lat1) * rad;
    const dLon = (lon2 - lon1) * rad;

    const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1 * rad) *
        Math.cos(lat2 * rad) *
        Math.sin(dLon / 2) ** 2;

    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

</script>

</body>
</html>
